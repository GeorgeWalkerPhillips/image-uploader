<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <script src="https://accounts.google.com/gsi/client" async defer></script>

    <!--
      TODO before launch:
      logo192.png / logo512.png / favicon.ico are still the default
      Create React App logo, not your brand. Run the favicon-gen skill
      (or your own export) from a real logo to replace them — the
      "VAL." wordmark files in public/ predate the Valere rebrand and
      are only 150x150, too low-res for a 512px icon or a social share
      card.
    -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <title>Wedding &amp; Event Photo Sharing App - No App Required | Valere</title>
    <meta
      name="description"
      content="Every guest's photos, one shared gallery. Guests scan a QR code and upload straight from their phone. No app download, no account needed. Free to start. Perfect for weddings, parties, and corporate events."
    />
    <meta name="keywords" content="wedding photo sharing app, wedding guest photos, shared photo gallery, QR code photo upload, event photo app, disposable camera app alternative" />
    <link rel="canonical" href="https://www.valere.co.za/" />

    <meta property="og:title" content="Valere - Every Guest's Photos, One Wedding Gallery" />
    <meta property="og:description" content="Guests scan a QR code and upload photos straight from their phone. No app, no account needed. Watch your shared gallery fill up live, then download everything as one ZIP." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.valere.co.za/" />
    <meta property="og:image" content="https://www.valere.co.za/logo512.png" />
    <meta property="og:site_name" content="Valere" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Valere - Every Guest's Photos, One Wedding Gallery" />
    <meta name="twitter:description" content="No app to download, no account needed. Guests scan a QR code and upload photos straight into your shared event gallery." />
    <meta name="twitter:image" content="https://www.valere.co.za/logo512.png" />

    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <!--
      manifest.json provides metadata used when your web app is installed on a
      user's mobile device or desktop. See https://developers.google.com/web/fundamentals/web-app-manifest/
    -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <!--
      Notice the use of %PUBLIC_URL% in the tags above.
      It will be replaced with the URL of the `public` folder during the build.
      Only files inside the `public` folder can be referenced from the HTML.

      Unlike "/favicon.ico" or "favicon.ico", "%PUBLIC_URL%/favicon.ico" will
      work correctly both with client-side routing and a non-root public URL.
      Learn how to configure a non-root public URL by running `npm run build`.
    -->

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "SoftwareApplication",
        "name": "Valere",
        "url": "https://www.valere.co.za/",
        "applicationCategory": "PhotographyApplication",
        "operatingSystem": "Any (Web-based)",
        "description": "A shared photo gallery for weddings, parties, and events. Guests scan a QR code and upload photos straight from their phone with no app download or account required.",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "ZAR",
          "description": "First event free; additional events R50 flat, no subscription."
        }
      }
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>

  </body>
</html>
